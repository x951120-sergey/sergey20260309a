<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sergey's Flotropica Empire 👑</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Modak&family=Noto+Sans+TC:wght@700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: url('images/flotropica.png') no-repeat center center fixed;
    background-size: cover;
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

/* 音樂 */
audio {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 3000;
}

/* 頭像 */
.profile-img {
    width:220px;
    height:220px;
    border-radius:50%;
    border:8px solid #FFD700;
    object-fit:cover;
    margin-bottom:20px;
    cursor:pointer;
    transition: transform 0.8s ease;
}

/* 自轉動畫 */
.spin {
    transform: rotateY(360deg) scale(1.1);
}

/* UI */
.container { max-width:750px; margin:60px auto; padding:20px; }

.y2k-frame {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    border: 10px dotted #FF00FF;
    border-radius: 50px;
    padding: 40px;
    box-shadow: 0 0 50px rgba(255,0,255,0.4);
    text-align: center;
}

h1 {
    font-family:'Modak';
    font-size:55px;
    color:#FF00FF;
    text-shadow:4px 4px 0 #00FFFF;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.8);
    border:3px solid #333;
    border-radius:20px;
    padding:25px;
    margin:20px 0;
    text-align:left;
    box-shadow:10px 10px 0 #333;
}

/* 影片 */
.video-container {
    position:relative;
    padding-bottom:56.25%;
    height:0;
}
.video-container iframe {
    position:absolute;
    width:100%;
    height:100%;
}

/* 技能條 */
.skill-item {
    display:flex;
    align-items:center;
    gap:15px;
    margin:15px 0;
}

.baddie-icon {
    width:45px;
    height:45px;
    background:url('images/baddie.png') no-repeat center;
    background-size:contain;
}

.bar-bg {
    flex-grow:1;
    height:25px;
    background:#eee;
    border-radius:15px;
    border:2px solid #333;
    overflow:hidden;
}

.bar-fill {
    height:100%;
    background:linear-gradient(90deg,#FF69B4,#FFD700);
}

/* 按鈕 */
.yes-btn {
    display:block;
    width:220px;
    height:80px;
    margin:40px auto;
    background:url('images/yes.png') no-repeat center;
    background-size:contain;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 音樂 -->
<audio id="bgm" autoplay loop muted controls>
    <source src="music/bgm.mp3" type="audio/mpeg">
</audio>

<div class="container">
<div class="y2k-frame">

<!-- 🔥 自轉頭像 -->
<img src="images/1000022247.jpg" class="profile-img" id="avatar">

<h1>SERGEY FETISOV</h1>
<p>🌟 <b>學號:114054040 . 亞洲大學 一年級</b> 🌟</p>

<!-- 🎬 影片 -->
<div class="card">
<h2>👑 皇室自介影片</h2>
<div class="video-container">
<iframe 
src="https://www.youtube-nocookie.com/embed/z-MHgEJ7ZJc?rel=0"
frameborder="0"
allowfullscreen>
</iframe>
</div>
</div>

<!-- 📝 文字區（已恢復） -->
<div class="card">
<h2>皇室簡介</h2>
<p>我是亞洲大學一年級學生QUEEN陳宥憲(學號:114054040)
    很能裝，不要問我裝甚麼，我是巴離釋迦垃圾袋。
    然後媽媽們能給我滿分嗎我不想被當。💅</p>
</div>

<!-- 💪 技能 -->
<div class="card">
<h2>核心神技</h2>

<div class="skill-item">
<div class="baddie-icon"></div>
<div class="bar-bg"><div class="bar-fill" style="width:70%"></div></div>
<span>精緻 4.87%</span>
</div>

<div class="skill-item">
<div class="baddie-icon"></div>
<div class="bar-bg"><div class="bar-fill" style="width:95%"></div></div>
<span>SLAY 95%</span>
</div>

</div>

<button class="yes-btn" onclick="alert('恭喜你，Flotropica 帝國正式收養你！✨🖕')"></button>

<footer>© 2026 Designed by Sergey Fetisov.</footer>

</div>
</div>

<script>
// 🎵 音樂解鎖
const audio = document.getElementById("bgm");

document.addEventListener("click", () => {
    audio.muted = false;
    audio.play();
}, { once:true });

// 🔥 頭像自轉變身
const avatar = document.getElementById("avatar");
let flipped = false;

avatar.addEventListener("click", () => {
    avatar.classList.add("spin");

    setTimeout(() => {
        flipped = !flipped;
        avatar.src = flipped
            ? "images/second.jpg"
            : "images/1000022247.jpg";
    }, 400);

    setTimeout(() => {
        avatar.classList.remove("spin");
    }, 800);
});

// 💎 鑽石雨
setInterval(()=>{
    const d = document.createElement("div");
    d.innerText="💎";
    d.style.position="fixed";
    d.style.left=Math.random()*window.innerWidth+"px";
    d.style.top="-20px";
    d.style.fontSize="24px";
    d.style.transition="5s linear";
    document.body.appendChild(d);

    requestAnimationFrame(()=>{
        d.style.transform=`translateY(${window.innerHeight}px) rotate(360deg)`;
        d.style.opacity="0";
    });

    setTimeout(()=>d.remove(),5000);
},300);
</script>

</body>
</html>
