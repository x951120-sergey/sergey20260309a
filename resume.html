<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sergey's Flotropica Empire 👑</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Modak&family=Noto+Sans+TC:wght@700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: url('images/flotropica.png') no-repeat center center fixed;
    background-size: cover;
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

/* 音樂播放器 */
audio {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 3000;
}

/* 頭像翻面 */
.flip-card {
    width:220px;
    height:220px;
    margin:0 auto 20px;
    perspective:1000px;
    cursor:pointer;
}

.flip-inner {
    width:100%;
    height:100%;
    transition:0.8s;
    transform-style: preserve-3d;
    position: relative;
}

.flip-card.flipped .flip-inner {
    transform: rotateY(180deg);
}

.profile-img {
    width:220px;
    height:220px;
    border-radius:50%;
    border:8px solid #FFD700;
    position:absolute;
    object-fit:cover;
    backface-visibility:hidden;
}

.back {
    transform: rotateY(180deg);
}

/* UI */
.container { max-width:750px; margin:60px auto; }
.y2k-frame {
    background:rgba(255,255,255,0.6);
    padding:40px;
    border-radius:50px;
    text-align:center;
}

h1 {
    font-family:'Modak';
    font-size:55px;
    color:#FF00FF;
}

/* 卡片 */
.card {
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:20px;
}

/* 影片 */
.video-container {
    position:relative;
    padding-bottom:56.25%;
    height:0;
}
.video-container iframe {
    position:absolute;
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<!-- 音樂 -->
<audio id="bgm" autoplay loop muted controls>
    <source src="music/bgm.mp3" type="audio/mpeg">
</audio>

<div class="container">
<div class="y2k-frame">

<!-- 翻面頭像 -->
<div class="flip-card" id="flipCard">
    <div class="flip-inner">
        <img src="images/1000022247.jpg" class="profile-img">
        <img src="images/second.jpg" class="profile-img back">
    </div>
</div>

<h1>SERGEY FETISOV</h1>

<div class="card">
<h2>👑 自介影片</h2>

<div class="video-container">
<iframe 
src="https://www.youtube-nocookie.com/embed/z-MHgEJ7ZJc"
frameborder="0"
allowfullscreen>
</iframe>
</div>

</div>

</div>
</div>

<script>
// 🔥 點擊解鎖音樂
const audio = document.getElementById("bgm");

document.addEventListener("click", () => {
    audio.muted = false;
    audio.play();
}, { once:true });


// 🔥 頭像翻面
document.getElementById("flipCard").onclick = function() {
    this.classList.toggle("flipped");

    // 同時啟動音樂
    audio.muted = false;
    audio.play();
};


// 💎 鑽石雨
setInterval(()=>{
    const d = document.createElement("div");
    d.innerText="💎";
    d.style.position="fixed";
    d.style.left=Math.random()*window.innerWidth+"px";
    d.style.top="-20px";
    d.style.fontSize="24px";
    d.style.transition="5s linear";
    document.body.appendChild(d);

    requestAnimationFrame(()=>{
        d.style.transform=`translateY(${window.innerHeight}px) rotate(360deg)`;
        d.style.opacity="0";
    });

    setTimeout(()=>d.remove(),5000);
},300);

</script>

</body>
</html>
