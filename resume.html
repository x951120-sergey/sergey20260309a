<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sergey Fetisov Resume</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Noto Sans TC",sans-serif;
}

body{
background:#f4f6fb;
transition:0.3s;
}

.dark{
background:#121212;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

header{
display:flex;
align-items:center;
gap:30px;
margin-bottom:40px;
}

.profile{
width:160px;
height:160px;
border-radius:50%;
object-fit:cover;
border:5px solid #2a5298;
}

.name{
font-size:32px;
font-weight:bold;
}

.subtitle{
color:gray;
margin-top:5px;
}

.dark .subtitle{
color:#ccc;
}

.card{
background:white;
padding:25px;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.dark .card{
background:#1e1e1e;
}

h2{
margin-bottom:15px;
color:#2a5298;
}

.dark h2{
color:#4ea3ff;
}

.skills{
margin-top:10px;
}

.skill{
margin-bottom:15px;
}

.bar{
height:10px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.bar div{
height:100%;
width:0;
background:#2a5298;
transition:1.5s;
}

.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.work{
background:#eee;
padding:40px;
text-align:center;
border-radius:10px;
}

.dark .work{
background:#333;
}

button{
padding:10px 20px;
border:none;
background:#2a5298;
color:white;
border-radius:20px;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:0.8;
}

footer{
text-align:center;
margin-top:30px;
color:gray;
}

.dark footer{
color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<header>

<img src="images/photo.jpg" class="profile">

<div>
<div class="name">Sergey Fetisov</div>
<div class="subtitle">亞洲大學學生 | AU114054040</div>

<button onclick="toggleDark()">切換深色模式</button>
</div>

</header>

<div class="card">

<h2>關於我</h2>

<p>
我是亞洲大學的學生，對設計與數位技術充滿興趣，
擅長將創意與技術結合。希望未來能在設計與科技領域
持續探索與發展。
</p>

</div>

<div class="card">

<h2>技能</h2>

<div class="skills">

<div class="skill">
HTML
<div class="bar"><div data-skill="90%"></div></div>
</div>

<div class="skill">
CSS
<div class="bar"><div data-skill="85%"></div></div>
</div>

<div class="skill">
JavaScript
<div class="bar"><div data-skill="75%"></div></div>
</div>

<div class="skill">
Design
<div class="bar"><div data-skill="80%"></div></div>
</div>

</div>

</div>

<div class="card">

<h2>學歷</h2>

<p>
亞洲大學  
Asia University  
目前就讀中
</p>

</div>

<div class="card">

<h2>作品集</h2>

<div class="portfolio">

<div class="work">作品 1</div>
<div class="work">作品 2</div>
<div class="work">作品 3</div>

</div>

</div>

<footer>

© 2026 Sergey Fetisov Resume

</footer>

</div>

<script>

function toggleDark(){
document.body.classList.toggle("dark");
}

window.onload=function(){

let skills=document.querySelectorAll(".bar div");

skills.forEach(function(skill){
skill.style.width=skill.dataset.skill;
})

}

</script>

</body>
</html>
